<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ball Ranger</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            pointer-events: none;
        }
        #joystick {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(0, 255, 204, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #joystick-knob {
            width: 40px;
            height: 40px;
            background: #00ffcc;
            border-radius: 50%;
        }
        .action-btn {
            position: fixed;
            pointer-events: auto;
            color: white;
            font-weight: bold;
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        
        /* Main Big Dash Button at the bottom right corner */
        #dash-btn {
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ff3344;
            font-size: 18px;
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.6);
        }

        /* Weapon 1 Button - directly above Dash */
        #weapon1-btn {
            bottom: 140px;
            right: 35px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #0099ff;
            font-size: 14px;
            border: 2px solid #ffffff;
            box-shadow: 0 0 12px rgba(0, 153, 255, 0.5);
        }

        /* Weapon 2 Button - top-left diagonal to Dash */
        #weapon2-btn {
            bottom: 115px;
            right: 115px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #00cc66;
            font-size: 14px;
            border: 2px solid #ffffff;
            box-shadow: 0 0 12px rgba(0, 204, 102, 0.5);
        }

        /* Weapon 3 Button - directly left to Dash */
        #weapon3-btn {
            bottom: 30px;
            right: 140px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #ff9900;
            font-size: 14px;
            border: 2px solid #ffffff;
            box-shadow: 0 0 12px rgba(255, 153, 0, 0.5);
        }

        #center-alert {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3344;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="PhysicsEngine.js"></script>
    <script src="GameUI.js"></script>
    <script src="MainScene.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="joystick">
            <div id="joystick-knob"></div>
        </div>
        
        <!-- The 4 Action Buttons -->
        <button id="dash-btn" class="action-btn">DASH</button>
        <button id="weapon1-btn" class="action-btn">W1</button>
        <button id="weapon2-btn" class="action-btn">W2</button>
        <button id="weapon3-btn" class="action-btn">W3</button>
        
        <div id="center-alert"></div>
    </div>
    <script>
        window.addEventListener('load', () => {
            if (typeof window.MainScene === 'function') {
                window.gameInstance = new window.MainScene();
            }
        });
    </script>
</body>
</html>
