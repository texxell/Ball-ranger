<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 优化移动端视口，防止双击缩放导致 Safari 延迟 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BallRanger.io - 3D Multiplayer Arena</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 安全的 HTTPS 三方库 CDN 导入 (Three.js 与 Firebase) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- 3D 渲染画布容器 -->
    <div id="game-canvas-container"></div>

    <!-- 游戏核心 UI 顶层覆盖物 -->
    <div id="ui-root">
        
        <!-- 顶部通知横幅 (如破纪录、击杀提示) -->
        <div id="notification-banner" class="hidden"></div>

        <!-- 顶部状态栏：钱包与个人质量分数 -->
        <div id="top-status-bar">
            <div id="wallet-display">🪙 <span id="coin-count">0</span> G</div>
            <div id="score-display">MASS: <span id="player-mass">2</span></div>
        </div>

        <!-- 实时排行榜：智能自适应（手机端呈现皇冠图标，点击展开） -->
        <div id="leaderboard" class="collapsed-mobile">
            <div id="leaderboard-toggle">👑 <span class="title-text">TOP 5 RANGERS</span></div>
            <ol id="leaderboard-list">
                <!-- 由 GameUI.js 动态渲染 -->
                <li>1. Loading...</li>
            </ol>
        </div>

        <!-- 浮动居中警告/提示框 -->
        <div id="center-alert" class="hidden"></div>

        <!-- 底部主操作区 (完美避开 Safari 底部工具栏) -->
        <div id="bottom-controls-container">
            
            <!-- 左侧虚拟遥杆专用触控区 (不污染全局事件) -->
            <div id="joystick-zone">
                <div id="joystick-base">
                    <div id="joystick-handle"></div>
                </div>
            </div>

            <!-- 右侧技能/装备快捷栏 (一字排开，符合高强度手机盲操) -->
            <div id="skill-action-bar">
                <button id="btn-shield" class="skill-btn locked" data-weapon="Shield">
                    <span class="icon">🛡️</span>
                    <span class="ammo">🔒 x0</span>
                </button>
                <button id="btn-lightning" class="skill-btn locked" data-weapon="Lightning">
                    <span class="icon">⚡</span>
                    <span class="ammo">🔒 x0</span>
                </button>
                <button id="btn-vacuum" class="skill-btn locked" data-weapon="Vacuum">
                    <span class="icon">🧲</span>
                    <span class="ammo">🔒 x0</span>
                </button>
                <button id="btn-dash" class="action-btn">
                    <span class="text">DASH</span>
                </button>
            </div>

        </div>
    </div>
<!-- 引入我们写好的业务逻辑文件（去掉 type="module"，降级为常规 JS 引入） -->
    <script src="./PhysicsEngine.js"></script>
    <script src="./GameUI.js"></script>
    <script src="./MainScene.js"></script>

    <!-- 【降级强制兜底】如果上面因为文件路径还是读不到，这里直接在 HTML 里原地注入核心渲染，逼屏幕亮起！ -->
    <script>
        window.addEventListener('load', () => {
            console.log("HTML Inline Script: Forcing WebGL initialization...");
            try {
                // 如果 MainScene.js 确实没被加载，这里直接原地起速渲染一个红屏，确保硬件通电
                if (!window.gameScene && typeof THREE !== 'undefined') {
                    const container = document.getElementById('game-canvas-container');
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0xFF0000); // 耀眼的纯红
                    
                    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
                    camera.position.set(0, 0, 10);
                    
                    const renderer = new THREE.WebGLRenderer({ antialias: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    container.appendChild(renderer.domElement);
                    
                    function alertAnimate() {
                        requestAnimationFrame(alertAnimate);
                        renderer.render(scene, camera);
                    }
                    alertAnimate();
                    console.error("!!! DETECTED: External JS files were blocked by browser! Emergency Red Screen triggered. !!!");
                }
            } catch(e) {
                alert("Critical Error: " + e.message);
            }
        });
    </script>
