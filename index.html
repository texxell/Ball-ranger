<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BallRanger.io - 3D 2048 Mega Bowl</title>
    <style>
        /* 👑 顶级防断触、防误触、防双击缩放视口 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0A0A0F;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 3D 渲染舞台 */
        #game-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* UI 总夹层 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; /* 穿透层，确保全屏盲操能摸到下方的屏幕 */
        }
        
        /* 确保所有真正的按钮UI能重新捕获点击 */
        .interactive { pointer-events: auto; }

        /* 📊 局内顶部战术面板 */
        .top-bar {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stats-box {
            background: rgba(20, 20, 35, 0.75); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 10px 20px; color: #FFF; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; gap: 20px;
        }
        .stat-item span { color: #00FFCC; }

        /* ⚔️ 右侧独立武器控制区（游戏里被锁定的武器图标挂载在这里） */
        .weapon-sidebar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px;
        }
        .weapon-btn {
            width: 70px; height: 70px; background: rgba(15, 15, 25, 0.85);
            border: 2px solid #555; border-radius: 16px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: #FFF; position: relative; cursor: pointer; transition: all 0.2s;
        }
        .weapon-btn.locked { border-color: #FF3366; background: rgba(40, 15, 20, 0.9); }
        .weapon-btn .lock-icon { font-size: 18px; color: #FF3366; }
        .weapon-btn .price-tag { font-size: 11px; color: #FFB300; margin-top: 2px; font-weight: bold; }
        .weapon-btn .weapon-name { font-size: 10px; color: #AAA; }
        .weapon-btn.unlocked { border-color: #00FFCC; background: rgba(15, 40, 30, 0.9); }
        .weapon-btn.unlocked .lock-icon { display: none; }
        .weapon-btn.unlocked .price-tag { color: #00FFCC; }

        /* 🏰 第一幕：开局主菜单战术大厅面板 (悬浮玻璃拟态) */
        #start-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
        }
        .menu-card {
            background: rgba(25, 25, 40, 0.85); border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 40px; width: 90%; max-width: 480px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); color: #FFF;
        }
        .menu-title { font-size: 38px; font-weight: 900; letter-spacing: 2px; color: #FFF; margin: 0 0 5px 0; text-shadow: 0 0 15px rgba(0,255,204,0.3); }
        .menu-subtitle { font-size: 14px; color: #888; margin-bottom: 35px; text-transform: uppercase; }
        
        .btn-main {
            width: 100%; padding: 16px; font-size: 22px; font-weight: 900;
            background: linear-gradient(135deg, #00FFCC 0%, #00A88F 100%);
            border: none; border-radius: 14px; color: #0A0A0F; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,255,204,0.4); margin-bottom: 20px; transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }

        .btn-ad {
            width: 100%; padding: 12px; font-size: 14px; font-weight: bold;
            background: rgba(255, 179, 0, 0.15); border: 1px solid #FFB300;
            border-radius: 12px; color: #FFB300; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-ad:hover { background: rgba(255, 179, 0, 0.25); }
        .btn-ad span.badge { background: #FFB300; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* 🚨 战术轻量提示框 */
        #alert-msg-box {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 51, 102, 0.9); color: white; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; font-size: 14px; z-index: 1000;
            box-shadow: 0 5px 15px rgba(255,51,102,0.4); transition: opacity 0.2s;
        }
        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <!-- 3D 巨碗战场容器 -->
    <div id="game-container"></div>

    <!-- UI 总图层 -->
    <div id="ui-layer">
        
        <!-- 📊 顶部数据看板 -->
        <div class="top-bar">
            <div class="stats-box">
                <div class="stat-item">GOLD: $<span id="ui-coins">0</span></div>
                <div class="stat-item">NUMBER: <span id="ui-number">2</span></div>
            </div>
        </div>

        <!-- ⚔️ 右侧独立武器控制区（标价：50/100/200） -->
        <div class="weapon-sidebar interactive">
            <div id="wpn-shield" class="weapon-btn locked" data-price="50">
                <span class="lock-icon">🔒</span>
                <span class="weapon-name">SHIELD</span>
                <span class="price-tag">$50</span>
            </div>
            <div id="wpn-lightning" class="weapon-btn locked" data-price="100">
                <span class="lock-icon">🔒</span>
                <span class="weapon-name">LIGHTNING</span>
                <span class="price-tag">$100</span>
            </div>
            <div id="wpn-vacuum" class="weapon-btn locked" data-price="200">
                <span class="lock-icon">🔒</span>
                <span class="weapon-name">VACUUM</span>
                <span class="price-tag">$200</span>
            </div>
        </div>

        <!-- 🏰 战术大厅开局菜单 -->
        <div id="start-menu" class="interactive">
            <div class="menu-card">
                <h1 class="menu-title">BALL RANGER 3D</h1>
                <div class="menu-subtitle">Mega Bowl 2048 Arena</div>
                
                <button id="btn-start-game" class="btn-main">START GAME</button>
                
                <button id="btn-watch-ad" class="btn-ad">
                    📺 WATCH AD FOR MEGA SIZE <span id="ad-status-text" class="badge">NEXT: N16</span>
                </button>
            </div>
        </div>

        <!-- 🚨 全局战术通知框 -->
        <div id="alert-msg-box" class="hidden">
            <span id="alert-text">ALERT</span>
        </div>

    </div>

    <!-- 引入 Three.js 核心 3D 动力库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 引入核心逻辑模块 -->
    <script type="module" src="GameUI.js"></script>
    <script type="module" src="MainScene.js"></script>
</body>
</html>
